name: Advanced CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '**.md'
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 12 * * 1'  # Run every Monday at 12:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Simulation on Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10.10', '1.11', '1.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-julia-${{ matrix.version }}-${{ hashFiles('Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.version }}-
      
      - name: Install dependencies
        run: |
          julia -e 'using Pkg; Pkg.add(["DifferentialEquations", "ModelingToolkit", "Plots"])'
      
      - name: Run simulation
        id: run_sim
        run: |
          julia A2P1.jl 2>&1 | tee output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      
      - name: Verify output files
        run: |
          if [ -f "pendulum.png" ]; then
            echo "✅ pendulum.png generated successfully"
            file pendulum.png
          else
            echo "❌ pendulum.png not found!"
            ls -la 
            exit 1
          fi
      
      - name: Check simulation output
        run: |
          if grep -q "Simulation complete" output.log; then
            echo "✅ Simulation completed successfully"
          else
            echo "❌ Simulation may have failed"
            cat output.log
            exit 1
          fi
      
      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-julia-${{ matrix.version }}
          path: |
            pendulum.png
            output.log
          retention-days: 30
      
      - name: Run performance benchmark
        run: |
          echo "## Performance Metrics" > benchmark.md
          echo "- Julia Version: ${{ matrix.version }}" >> benchmark.md
          echo "- Run Date: $(date)" >> benchmark.md
          echo "- Exit Code: ${{ steps.run_sim.outputs.exit_code }}" >> benchmark.md
          cat benchmark.md

  notify:
    name: Send Notification
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "🎉 All tests passed!"
          else
            echo "⚠️ Some tests failed. Check the logs."
          fi
