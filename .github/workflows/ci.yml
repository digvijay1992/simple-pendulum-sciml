name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['1.10.10', '1.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
      
      - name: Install dependencies
        run: |
          if [ -f "Project.toml" ]; then
            echo "📦 Project.toml found - running Pkg.instantiate()"
            julia -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'
          else
            echo "📦 No Project.toml - installing packages directly"
            julia -e 'using Pkg; Pkg.add(["DifferentialEquations", "ModelingToolkit", "Plots"]); Pkg.precompile()'
          fi
      
      - name: Verify packages
        run: |
          julia -e 'using DifferentialEquations, ModelingToolkit, Plots; println("✅ All packages loaded successfully!")'
      
      - name: Run pendulum simulation
        run: julia A2P1.jl
      
      - name: Verify output
        run: |
          if [ -f "pendulum.png" ]; then
            echo "✅ Simulation successful!"
          else
            echo "❌ Failed to generate plot"
            exit 1
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pendulum-results
          path: pendulum.png
