name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['1.10', '1.11']  # Using major versions for better compatibility
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
      
      - name: Display Julia version
        run: julia --version
      
      - name: Install dependencies
        run: |
          julia -e '
            using Pkg
            println("Installing DifferentialEquations...")
            Pkg.add("DifferentialEquations")
            println("Installing ModelingToolkit...")
            Pkg.add("ModelingToolkit")
            println("Installing Plots...")
            Pkg.add("Plots")
            println("All packages installed successfully!")
          '
      
      - name: Verify installations
        run: |
          julia -e '
            println("Checking packages...")
            using DifferentialEquations
            using ModelingToolkit
            using Plots
            println("✅ All packages loaded successfully!")
          '
      
      - name: List files
        run: ls -la
      
      - name: Run pendulum simulation
        run: julia A2P1.jl
      
      - name: Verify output
        run: |
          if [ -f "pendulum.png" ]; then
            echo "✅ Simulation successful! pendulum.png generated."
            ls -lh pendulum.png
          else
            echo "❌ Failed to generate pendulum.png"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pendulum-results-julia-${{ matrix.version }}
          path: pendulum.png
          if-no-files-found: error
