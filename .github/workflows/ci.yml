name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1.11', '1.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v2  # ✅ Changed: Use @v2, NOT a SHA
        with:
          version: ${{ matrix.version }}
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-julia-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.version }}-
      
      - name: Install dependencies
        run: |
          if [ -f "Project.toml" ]; then
            julia -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'
          else
            julia -e 'using Pkg; Pkg.add(["DifferentialEquations", "ModelingToolkit", "Plots"]); Pkg.precompile()'
          fi
      
      - name: Verify packages
        run: |
          julia -e 'using DifferentialEquations, ModelingToolkit, Plots; println("✅ All packages loaded successfully!")'
      
      - name: Run pendulum simulation
        run: julia A2P1.jl
      
      - name: Verify output
        run: |
          if [ -f "pendulum.png" ]; then
            echo "✅ Pendulum simulation successful!"
            file pendulum.png
          else
            echo "❌ Failed to generate pendulum.png"
            ls -la
            exit 1
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pendulum-results-julia-${{ matrix.version }}
          path: |
            pendulum.png
            *.log
          retention-days: 30
          if-no-files-found: warn
