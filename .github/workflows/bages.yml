name: Generate Badges

on:
  workflow_run:
    workflows: ["Advanced CI Pipeline"]
    types: [completed]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Generate badge data
        id: badges
        run: |
          # Create badges directory
          mkdir -p .github/badges
          
          # Get last commit date
          LAST_COMMIT=$(git log -1 --format=%cd --date=format:'%Y-%m-%d')
          echo "LAST_COMMIT=$LAST_COMMIT" >> $GITHUB_OUTPUT
          
          # Count total commits
          TOTAL_COMMITS=$(git rev-list --count HEAD)
          echo "TOTAL_COMMITS=$TOTAL_COMMITS" >> $GITHUB_OUTPUT
          
          # Check if Project.toml exists
          if [ -f "Project.toml" ]; then
            echo "PROJECT_OK=true" >> $GITHUB_OUTPUT
          else
            echo "PROJECT_OK=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Update README with dynamic content
        run: |
          # Add or update badges section in README
          sed -i '/## 📊 Project Status/d' README.md
          sed -i '/### 📈 Live Metrics/d' README.md
          
          cat >> README.md << 'EOF'
          
          ## 📊 Project Status
          
          ### 📈 Live Metrics
          | Metric | Value |
          |--------|-------|
          | 📅 Last Update | ${{ steps.badges.outputs.LAST_COMMIT }} |
          | 📊 Total Commits | ${{ steps.badges.outputs.TOTAL_COMMITS }} |
          | ✅ Project.toml | ${{ steps.badges.outputs.PROJECT_OK }} |
          | 🔄 CI Status | [![CI](https://github.com/${{ github.repository }}/actions/workflows/ci.yml/badge.svg)](https://github.com/${{ github.repository }}/actions/workflows/ci.yml) |
          EOF
      
      - name: Commit badge updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update badges [skip ci]"
          git push
