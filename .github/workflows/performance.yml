name: Performance Benchmarking

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark Performance
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.10.10'
      
      - name: Install dependencies
        run: |
          julia -e 'using Pkg; Pkg.add(["DifferentialEquations", "ModelingToolkit", "Plots", "BenchmarkTools"])'
      
      - name: Run performance benchmarks
        run: |
          cat > benchmark.jl << 'JULIA'
          using BenchmarkTools
          using DifferentialEquations
          
          function pendulum!(du, u, p, t)
              θ, ω = u
              g, l, m, Mt = p
              du[1] = ω
              du[2] = -(3*g)/(2*l) * sin(θ) + 3/(m*l^2) * Mt
          end
          
          u0 = [0.01, 0.0]
          p = [9.81, 1.0, 1.0, 0.1]
          tspan = (0.0, 10.0)
          prob = ODEProblem(pendulum!, u0, tspan, p)
          
          # Benchmark the solver
          t_bench = @benchmark solve(prob, Tsit5(), reltol=1e-8, abstol=1e-8)
          
          # Save results
          open("benchmark_results.json", "w") do f
              println(f, "{")
              println(f, "  \"time_min\": $(minimum(t_bench.times)/1e6),")
              println(f, "  \"time_median\": $(median(t_bench.times)/1e6),")
              println(f, "  \"time_max\": $(maximum(t_bench.times)/1e6),")
              println(f, "  \"memory\": $(t_bench.memory),")
              println(f, "  \"allocs\": $(t_bench.allocs)")
              println(f, "}")
          end
          
          println("Benchmark complete!")
          JULIA
          
          julia benchmark.jl
      
      - name: Display benchmark results
        run: |
          echo "## 📊 Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat benchmark_results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: benchmark_results.json
          retention-days: 90
      
      - name: Compare with previous run
        run: |
          echo "📈 Performance tracking enabled"
          echo "Check artifacts for historical data"
